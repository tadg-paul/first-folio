# Shunn-style US prose manuscript overrides.
# Loaded on top of british-manuscript.yaml.

folio:
  manuscript:
    style: us
    margin: 25mm

    font: Menlo
    font-size: 10pt
    font-weight: regular

    heading-font: Menlo
    heading-font-size: 10pt
    heading-font-weight: regular

    mono-font: Iosevka Custom
    mono-font-size: 9pt
    mono-font-weight: bold

    title-font: Menlo
    title-font-size: 10pt
    title-font-weight: regular

    subtitle-font: Menlo
    subtitle-font-size: 10pt
    subtitle-font-weight: regular

    author-font: Menlo
    author-font-size: 10pt
    author-font-weight: regular
    date-font: Menlo
    date-font-size: 10pt
    date-font-weight: regular
    date-format: "January 2, 2006"

    version-font: Menlo
    version-font-size: 10pt
    version-font-weight: regular

    wordcount-font: Menlo
    wordcount-font-size: 10pt
    wordcount-font-weight: regular

    contact-font: Menlo
    contact-font-size: 10pt
    contact-font-weight: regular

    line-spacing: 2
    paragraph-indent: 12.7mm
    paragraph-spacing: 0

    title-page:
      title-block-align: center

    page-header:
      enabled: true
      font: Menlo
      font-size: 10pt
      font-weight: regular
      format: "[title] • [chapter] • [author]"
      align: left-right

    page-footer:
      enabled: true
      font: Menlo
      font-size: 10pt
      font-weight: regular
      format: "[page]"
      align: center

    toc:
      font: Menlo
      font-size: 10pt
      font-weight: regular
      heading-font: Menlo
      heading-font-size: 10pt
      heading-font-weight: regular

    part:
      case-transform: upper
