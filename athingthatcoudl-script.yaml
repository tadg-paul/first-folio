# British prose manuscript layout.
# Loaded as the manuscript base; user script.yaml values override this.

folio:
  page: a4
  font: Libertinus Serif
  font-size: 11pt
  heading-font: Libertinus Sans
  heading-font-size: 14pt

  manuscript:
    style: british
    page: 5.5x8.5in
    margin: 15mm
    gutter: 20mm

    font: Libertinus Serif
    font-size: 11pt

    heading-font: Libertinus Sans
    heading-font-size: 13pt
    heading-font-weight: regular

    mono-font: Libertinus Mono
    mono-font-size: 9pt
    mono-font-weight: regular

    title-font: Libertinus Sans
    title-font-size: 18pt
    title-font-weight: bold

    subtitle-font: Libertinus Sans
    subtitle-font-size: 13pt
    subtitle-font-weight: regular
    subtitle-font-style: regular

    author-font: Libertinus Sans
    author-font-size: 12pt
    author-font-weight: regular
    author-font-style: italic
    date-font: Libertinus Sans
    date-font-size: 10pt
    date-font-weight: regular
    date-format: "2 January 2006"

    version-font: Libertinus Sans
    version-font-size: 10pt
    version-font-weight: regular

    wordcount-font: Libertinus Sans
    wordcount-font-size: 10pt
    wordcount-font-weight: regular

    contact-font: Libertinus Sans
    contact-font-size: 10pt
    contact-font-weight: regular

    line-spacing: 1.2
    paragraph-indent: 7mm
    paragraph-spacing: 1mm

    title-page:
      enabled: true
      page-number: false
      include-title: true
      include-subtitle: false
      include-author: true
      include-date: true
      include-wordcount: false
      include-contact-name: false
      include-address: false
      include-phone: false
      include-email: false
      include-website: false
      include-version: true
      # Per-item title-page align is available via AC15.5 (title/subtitle/author/date/
      # wordcount/version/contact each accept `align:` values). Defaults are intentionally
      # left unset here so an unconfigured British manuscript renders the legacy centred
      # title-block layout with contact at top-left and the British footer grid at the
      # bottom (version | wordcount | date), unchanged from the pre-issue-15 look.

    page-header:
      enabled: false
      font: Libertinus Sans
      font-size: 10pt
      font-weight: regular
      # font-style: italic

      format: "[page] / [part]"
      alt-format: "[chapter] / [page]"
      
      align: left-right
      distance-from-edge: 20mm
      content-padding-after: 5mm

    page-footer:
      font: Libertinus Sans
      font-size: 10pt
      font-weight: regular
      # font-style: italic

      format: "[page] / [part]"
      alt-format: "[chapter] / [page]"
      
      align: left-right
      distance-from-edge: 15mm
      content-padding-after: 5mm

    toc:
      enabled: true
      title: "Contents"
      page-break-before: true
      font: Libertinus Sans
      font-size: 12pt
      font-weight: regular
      heading-font: Libertinus Sans
      heading-font-size: 15pt
      heading-font-weight: bold
      include-parts: true
      include-chapters: true
      include-sections: false
      dot-leaders: true
      page-numbers: true
      line-spacing: 3em
      part-gap-before: 3em
      part-bold: true

    scene-break:
      marker: "#"

    list:
      space-before: 0.5em
      space-after: 1em

    table:
      space-before: 1em
      space-after: 1em

    code-block:
      space-before: 1em
      space-after: 1em

    part:
      prefix: "Part "
      number-format: "I"
      separator: ": "
      show-name: true
      show-number: true
      name-case: upper
      case-transform: upper
      explicit-numbering: derived
      page-break-before: true
      blank-page-before: enforce-right
      vertical-align: center
      align: center
      skip-header: true
      skip-footer: true

    chapter:
      prefix: ""
      number-format: "1"
      separator: ": "
      show-name: true
      show-number: true
      name-case: as-written
      explicit-numbering: derived
      page-break-before: true
      blank-page-before: enforce-right
      position: one-third
      align: center
      case-transform: as-written
      space-after: 2em
      skip-header: true
      skip-footer: true

    copyright:
      enabled: true
      credits:
        - heading: "Copyright"
          year: 2026
          # holders omitted → defaults to [folio.author] → ["Taḋg Paul"]
        - heading: "Photography"
          year: 1988
          holders:
            - Sarah-Louise Fortune
      body:
        # Override the British preset's plural wording for your solo-author case:
        - "The moral rights of the author and photographer to be identified as the creators of their work have been asserted."
        - "**All rights reserved.** No part of this publication, including text or images, may be reproduced, stored in a retrieval system, or transmitted in any form or by any means without prior written permission from the respective copyright holder."
        - "Legal deposit copies lodged with the National Library of Ireland, the five designated Irish libraries, and the British Library. A catalogue record is available from the National Library of Ireland."

      publication:
        - "First published in Ireland in 2026"
        - "First published in the United Kingdom in 2026"
      publisher: "Taḋg Paul"
      isbn: 979-8-1881860-1-2
